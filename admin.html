<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-kiroku | 管理画面</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Additional styles for admin screen */
        .admin-layout {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        .admin-header {
            background: var(--secondary-color);
            color: white;
            padding: var(--spacing-4) var(--spacing-5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: none;
        }

        .admin-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 0.75rem;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.1);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-3);
            margin-top: var(--spacing-4);
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .delete-btn {
            color: #ef4444;
            background: none;
            border: 1px solid #ef4444;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .delete-btn:hover {
            background: #fee2e2;
        }

        .schedule-card {
            padding: var(--spacing-3);
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .to-app-link {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius-md);
            transition: background 0.2s;
        }

        .admin-nav {
            display: flex;
            background: white;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: var(--spacing-4);
            overflow-x: auto;
        }

        .admin-nav-item {
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            white-space: nowrap;
        }

        .admin-nav-item.active {
            color: var(--secondary-color);
            border-bottom-color: var(--secondary-color);
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        .calendar-container {
            background: white;
            border-radius: var(--border-radius-md);
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-top: var(--spacing-4);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-bottom: 1px solid var(--border-color);
        }

        .calendar-day-head {
            padding: 8px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            background: #f8fafc;
            border-right: 1px solid var(--border-color);
        }

        .calendar-body {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .calendar-day {
            min-height: 80px;
            padding: 4px;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
            position: relative;
        }

        .calendar-day:nth-child(7n) {
            border-right: none;
        }

        .calendar-day.other-month {
            background: #f1f5f9;
            color: #94a3b8;
        }

        .calendar-day.today {
            background: #f0f9ff;
        }

        .holiday-bg {
            background: #fef2f2 !important;
        }

        .cal-event {
            background: #e0f2fe;
            color: #0369a1;
            padding: 2px 4px;
            border-radius: 2px;
            margin-top: 2px;
            font-size: 0.6rem;
            line-height: 1.1;
            white-space: normal;
            word-break: break-all;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            line-clamp: 3;
            border-left: 2px solid #0369a1;
            cursor: pointer;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: var(--border-radius-md);
            padding: var(--spacing-4);
            box-shadow: var(--shadow-lg);
        }

        .revenue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
        }

        .revenue-item:last-child {
            border-bottom: none;
        }

        .revenue-item .details {
            display: flex;
            flex-direction: column;
        }

        .revenue-item .units {
            font-weight: 700;
            color: var(--primary-color);
        }

        /* QR Modal Print Styles */
        @media print {
            body * {
                visibility: hidden;
            }

            #qr-print-modal,
            #qr-print-modal * {
                visibility: visible;
            }

            #qr-print-modal {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: white;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="admin-layout" id="app">
        <header class="app-header admin-header">
            <h1 class="admin-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                e-kiroku <span class="badge">管理画面</span>
            </h1>
            <div style="margin-left:auto; margin-right:12px; display:flex; gap:8px;">
                <button id="btn-toggle-rubi" class="btn"
                    style="padding:4px 8px; font-size:0.75rem; background:rgba(255,255,255,0.2); color:white; border:none; border-radius:4px;">ルビ:
                    ON</button>
            </div>
            <a href="index.html" class="to-app-link">
                現場アプリへ
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>
        </header>

        <nav class="admin-nav">
            <div class="admin-nav-item active" data-tab="dashboard">ダッシュボード</div>
            <div class="admin-nav-item" data-tab="patterns">予定設定</div>
            <div class="admin-nav-item" data-tab="monthly">月間シフト</div>
            <div class="admin-nav-item" data-tab="notifications">通知・収益</div>
            <div class="admin-nav-item" data-tab="users">利用者</div>
            <div class="admin-nav-item" data-tab="helpers">ヘルパー</div>
            <div class="admin-nav-item" data-tab="templates">テンプレート</div>
        </nav>

        <main class="main-content">
            <!-- Tab: Dashboard -->
            <div id="pane-dashboard" class="tab-pane active">
                <div class="card" style="border-top: 4px solid #f43f5e; margin-bottom:var(--spacing-4);">
                    <h2 style="font-size: 1.1rem; margin-bottom:var(--spacing-4);">アラート・通知</h2>
                    <div id="admin-alerts-container"></div>
                </div>
                <div class="card" style="border-top: 4px solid #f59e0b;">
                    <h2 style="font-size: 1.1rem; margin-bottom:var(--spacing-4);">今日の予定</h2>
                    <div id="today-schedule-list" class="schedule-grid">
                        <div style="color:var(--text-muted);font-size:0.9rem;padding:20px;text-align:center;">読み込み中...
                        </div>
                    </div>
                </div>
                <div class="card" style="border-top: 4px solid #6366f1;">
                    <h2 style="font-size: 1.1rem; margin-bottom:var(--spacing-4);">今月の状況</h2>
                    <div id="month-summary" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <div class="card" style="margin:0; text-align:center; padding:12px;">
                            <div style="font-size:0.8rem; color:var(--text-muted);">本日の記録数</div>
                            <div id="summary-today-records" style="font-size:1.5rem; font-weight:bold; color:#6366f1;">0
                            </div>
                        </div>
                        <div class="card" style="margin:0; text-align:center; padding:12px;">
                            <div style="font-size:0.8rem; color:var(--text-muted);">本日の残り予定</div>
                            <div id="summary-today-pending" style="font-size:1.5rem; font-weight:bold; color:#f59e0b;">0
                            </div>
                        </div>
                    </div>
                    <button onclick="adminApp.switchTab('notifications')" class="btn"
                        style="width:100%; margin-top:15px; background:var(--primary-bg); color:var(--primary-color); border:1px solid var(--primary-color);">
                        収益・通知の詳細を確認する
                    </button>
                </div>
            </div>

            <!-- Tab: Patterns -->
            <div id="pane-patterns" class="tab-pane">
                <div class="card" style="border-top: 4px solid var(--secondary-color);">
                    <h2
                        style="margin-bottom: var(--spacing-4); font-size: 1.1rem; display:flex; align-items:center; gap:8px;">
                        予定パターン登録
                    </h2>
                    <form id="schedule-form">
                        <div class="form-group">
                            <label class="form-label">曜日</label>
                            <div class="checkbox-group" id="s-days">
                                <label><input type="checkbox" value="1"> 月</label>
                                <label><input type="checkbox" value="2"> 火</label>
                                <label><input type="checkbox" value="3"> 水</label>
                                <label><input type="checkbox" value="4"> 木</label>
                                <label><input type="checkbox" value="5"> 金</label>
                                <label><input type="checkbox" value="6"> 土</label>
                                <label><input type="checkbox" value="0"> 日</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">時間帯</label>
                            <div id="time-slots-container">
                                <div class="time-input-group">
                                    <div style="display:flex; align-items:center; gap:4px;">
                                        <select class="form-control s-hour s-time-start-h" required></select>時
                                        <select class="form-control s-min s-time-start-m" required></select>分
                                    </div>
                                    <span>〜</span>
                                    <div style="display:flex; align-items:center; gap:4px;">
                                        <select class="form-control s-hour s-time-end-h" required></select>時
                                        <select class="form-control s-min s-time-end-m" required></select>分
                                    </div>
                                    <button type="button" class="delete-btn remove-time-btn"
                                        style="display:none;">✖</button>
                                </div>
                            </div>
                            <button type="button" id="btn-add-time" class="btn" style="width: auto; margin-top: 8px;">+
                                時間帯を追加</button>
                        </div>
                        <div class="form-group">
                            <label class="form-label">担当ヘルパー</label>
                            <select id="s-helper" class="form-control" required></select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">対象利用者</label>
                            <select id="s-user" class="form-control" required></select>
                        </div>
                        <button type="submit" class="btn btn-primary"
                            style="width:100%; background: var(--secondary-color);">パターンを登録</button>
                    </form>
                </div>
                <div id="schedule-list" class="schedule-grid"></div>
            </div>

            <!-- Tab: Monthly -->
            <div id="pane-monthly" class="tab-pane">
                <div class="card" style="border-top: 4px solid #6366f1;">
                    <div
                        style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--spacing-4);">
                        <h2 style="font-size: 1.1rem;">月間シフト管理</h2>
                        <select id="cal-helper-filter" class="form-control" style="width:auto; height: auto;"></select>
                    </div>
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <button class="btn" id="cal-prev" style="width: auto;">&lt;</button>
                            <span id="cal-month-title" style="font-weight:700;"></span>
                            <button class="btn" id="cal-next" style="width: auto;">&gt;</button>
                        </div>
                        <div class="calendar-grid">
                            <div class="calendar-day-head" style="color:#ef4444;">日</div>
                            <div class="calendar-day-head">月</div>
                            <div class="calendar-day-head">火</div>
                            <div class="calendar-day-head">水</div>
                            <div class="calendar-day-head">木</div>
                            <div class="calendar-day-head">金</div>
                            <div class="calendar-day-head" style="color:#3b82f6;">土</div>
                        </div>
                        <div id="calendar-days" class="calendar-body"></div>
                    </div>
                </div>
            </div>

            <!-- Tab: Notifications & Revenue -->
            <div id="pane-notifications" class="tab-pane">
                <div class="card" style="border-top: 4px solid var(--primary-color);">
                    <h2 style="font-size: 1.1rem; margin-bottom:var(--spacing-4);">管理者からの通知</h2>
                    <form id="notification-form" class="card"
                        style="background:#f0f9ff; border:1px solid #bae6fd; margin-bottom:var(--spacing-6);">
                        <div class="form-group">
                            <label class="form-label">タイトル</label>
                            <input type="text" id="n-title" class="form-control" placeholder="例：重要なお知らせ" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">内容</label>
                            <textarea id="n-content" class="form-control" style="min-height:80px;" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%;">通知を送信する</button>
                    </form>

                    <h2 style="font-size: 1.1rem; margin-bottom:var(--spacing-4);">月次収益シミュレーション</h2>
                    <div class="card" style="background:#f8fafc; border:1px solid #e2e8f0;">
                        <div
                            style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <select id="rev-month-select" class="form-control"
                                style="width:auto; height:auto; padding:5px 10px;"></select>
                            <div style="font-size:1.2rem; font-weight:bold; color:var(--primary-color);">
                                <span id="rev-total-units">0</span> 円
                            </div>
                        </div>
                        <div id="revenue-list" style="max-height:400px; overflow-y:auto;"></div>
                    </div>
                </div>
            </div>

            <!-- Tab: Users -->
            <div id="pane-users" class="tab-pane">
                <div class="card" style="border-top: 4px solid var(--primary-color);">
                    <div
                        style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--spacing-4);">
                        <h2 style="font-size: 1.1rem; margin:0;">利用者管理</h2>
                        <div style="display:flex; gap:8px;">
                            <button id="btn-export-users" class="btn"
                                style="width:auto; padding:4px 12px; font-size:0.8rem; background:#475569; color:white;">CSV出力</button>
                            <label class="btn"
                                style="width:auto; padding:4px 12px; font-size:0.8rem; background:#0ea5e9; color:white; cursor:pointer; margin:0;">
                                CSV読込
                                <input type="file" id="btn-import-users" accept=".csv" style="display:none;">
                            </label>
                        </div>
                    </div>
                    <form id="user-form" class="card"
                        style="background:#f8fafc; border:1px solid #e2e8f0; margin-bottom:var(--spacing-4);">
                        <div class="form-group">
                            <label class="form-label">名前（ルビ可）</label>
                            <input type="text" id="u-name" class="form-control" required>
                        </div>
                        <div class="form-group" style="display:flex; gap:20px; margin-top:10px;">
                            <label><input type="checkbox" id="u-is-care"> 介護あり</label>
                            <label><input type="checkbox" id="u-is-3rd"> 3級</label>
                            <label><input type="checkbox" id="u-is-double"> 2人体制</label>
                        </div>
                        <button type="submit" id="btn-save-user" class="btn btn-primary"
                            style="width:100%;">保存する</button>
                    </form>
                    <div id="admin-user-list" class="schedule-grid"></div>
                </div>
            </div>

            <!-- Tab: Helpers -->
            <div id="pane-helpers" class="tab-pane">
                <div class="card" style="border-top: 4px solid var(--secondary-color);">
                    <div
                        style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--spacing-4);">
                        <h2 style="font-size: 1.1rem; margin:0;">ヘルパー管理</h2>
                        <div style="display:flex; gap:8px;">
                            <button id="btn-export-helpers" class="btn"
                                style="width:auto; padding:4px 12px; font-size:0.8rem; background:#475569; color:white;">CSV出力</button>
                            <label class="btn"
                                style="width:auto; padding:4px 12px; font-size:0.8rem; background:#0ea5e9; color:white; cursor:pointer; margin:0;">
                                CSV読込
                                <input type="file" id="btn-import-helpers" accept=".csv" style="display:none;">
                            </label>
                        </div>
                    </div>
                    <form id="helper-form" class="card" style="background:#f8fafc; border:1px solid #e2e8f0;">
                        <div class="form-group">
                            <label class="form-label">ヘルパー名</label>
                            <input type="text" id="h-name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">メールアドレス</label>
                            <input type="email" id="h-email" class="form-control" required>
                        </div>
                        <button type="submit" id="btn-save-helper" class="btn btn-primary"
                            style="width:100%;">登録</button>
                    </form>
                    <div id="admin-helper-list" class="schedule-grid"></div>
                </div>
            </div>

            <!-- Tab: Templates -->
            <div id="pane-templates" class="tab-pane">
                <div class="card" style="border-top: 4px solid #10b981;">
                    <h2 style="font-size: 1.1rem; margin-bottom:var(--spacing-4);">テンプレート管理</h2>
                    <div class="tabs-container" style="margin-bottom: 20px;">
                        <div class="tabs-header" id="template-admin-tabs">
                            <button type="button" class="tab-btn active" data-category="club">くらぶ</button>
                            <button type="button" class="tab-btn" data-category="kaeru">かえる</button>
                            <button type="button" class="tab-btn" data-category="other">その他</button>
                        </div>
                    </div>
                    <form id="template-form" class="card"
                        style="background:#f8fafc; border:1px solid #e2e8f0; margin-bottom:var(--spacing-4);">
                        <input type="hidden" id="t-category" value="club">
                        <div class="form-group">
                            <label class="form-label">タイトル</label>
                            <input type="text" id="t-title" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">内容</label>
                            <textarea id="t-content" class="form-control" style="min-height:80px;" required></textarea>
                        </div>
                        <button type="submit" id="btn-save-template" class="btn btn-primary"
                            style="width:100%; background:#10b981;">追加/更新</button>
                    </form>
                    <div id="admin-template-list"
                        style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:12px;">
                    </div>
                </div>
            </div>
        </main>

        <!-- Modal -->
        <div id="modal-date-schedule" class="modal-overlay">
            <div class="modal-card">
                <h3 id="modal-date-title" style="margin-bottom:var(--spacing-3); font-size:1.1rem;">予定登録</h3>
                <form id="specific-schedule-form">
                    <input type="hidden" id="spec-date">
                    <div class="form-group">
                        <label class="form-label">時間</label>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <select id="spec-time-start-h" class="form-control" style="width:70px;"></select>時
                            <select id="spec-time-start-m" class="form-control" style="width:70px;"></select>分
                        </div>
                        <div style="display:flex; gap:8px; align-items:center; margin-top:8px;">
                            <select id="spec-time-end-h" class="form-control" style="width:70px;"></select>時
                            <select id="spec-time-end-m" class="form-control" style="width:70px;"></select>分
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">利用者</label>
                        <select id="spec-user" class="form-control" required></select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">ヘルパー</label>
                        <select id="spec-helper" class="form-control" required></select>
                    </div>
                    <div style="display:flex; gap:8px; margin-top:var(--spacing-4);">
                        <button type="button" id="btn-close-modal" class="btn" style="flex:1;">閉じる</button>
                        <button type="submit" class="btn btn-primary" style="flex:2;">保存</button>
                    </div>
                    <button type="button" id="btn-delete-spec" class="btn"
                        style="width:100%; margin-top:8px; background:#fee2e2; color:#ef4444; border:1px solid #ef4444; display:none;">削除</button>
                    <!-- QR Print Modal -->
                    <div id="qr-print-modal" class="modal-overlay">
                        <div class="modal-card" style="text-align: center;">
                            <h3 id="qr-user-name"
                                style="margin-bottom:15px; font-size:1.2rem; color:var(--primary-color);"></h3>
                            <div id="qr-code-container"
                                style="margin: 0 auto 20px; display:inline-block; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px;">
                            </div>
                            <div class="no-print" style="display:flex; gap:8px;">
                                <button type="button" id="btn-close-qr-modal" class="btn" style="flex:1;">閉じる</button>
                                <button type="button" onclick="window.print()" class="btn btn-primary"
                                    style="flex:2;">印刷する</button>
                            </div>
                        </div>
                    </div>

            </div>
            <!-- Scripts -->
            <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
            <script src="js/admin.js"></script>
</body>

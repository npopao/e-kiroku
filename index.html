<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-kiroku | オンライン記録システム</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app">
        <header class="app-header">
            <h1 class="logo">e-kiroku</h1>
            <div style="margin-left:auto; margin-right:12px; display:flex; gap:8px;">
                <button id="btn-toggle-rubi" class="btn"
                    style="padding:4px 8px; font-size:0.75rem; background:rgba(255,255,255,0.2); color:white; border:none; border-radius:4px;">ルビ:
                    ON</button>
            </div>
            <div class="user-profile" id="btn-logout" style="cursor:pointer;" title="タップしてアカウントを切り替え">
                <div class="avatar" id="current-helper-avatar">?</div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <div id="view-dashboard" class="view active">
                <div id="notification-banner" class="notification-banner" style="display:none; margin-bottom:15px;">
                </div>
            </div>
            <div id="view-schedule" class="view">
                <div class="schedule-day-view">
                    <!-- Day view content will be injected here -->
                </div>
                <div class="schedule-month-view">
                    <!-- Month view content (calendar boilerplate) will be injected here -->
                </div>
            </div>
            <div id="view-record" class="view">
                <!-- One-tap area will be injected by js -->
            </div>
            <div id="view-history" class="view"></div>
        </main>

        </main>

        <!-- QR Code Scanner Modal -->
        <div id="qr-modal" class="modal-overlay"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; flex-direction:column;">
            <div
                style="background:white; padding:20px; border-radius:12px; width:90%; max-width:400px; text-align:center;">
                <h3 style="margin-bottom:15px; color:var(--primary-color);">利用者QRコード読み取り</h3>
                <div id="qr-reader"
                    style="width:100%; max-width:300px; margin:0 auto; overflow:hidden; border-radius:8px;"></div>
                <button id="btn-close-qr" class="btn"
                    style="margin-top:20px; width:100%; background:#f1f5f9; color:var(--text-color);">キャンセル</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-view="dashboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span><ruby>ホーム<rt>ほーむ</rt></ruby></span>
            </button>
            <button class="nav-btn" data-view="schedule">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span><ruby>予定<rt>よてい</rt></ruby></span>
            </button>
            <button class="nav-btn" data-view="record">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                <span><ruby>記録<rt>きろく</rt></ruby></span>
            </button>
            <button class="nav-btn" data-view="history">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.5 8.5 0 0 1 4.6 1.3L21 3.5v8z">
                    </path>
                </svg>
                <span><ruby>履歴<rt>りれき</rt></ruby></span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
